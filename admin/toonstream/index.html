<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toonstream Full Fetch</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
  <div class="max-w-3xl mx-auto">

    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-white">🎬 Toonstream Series Fetcher</h1>
      <a href="/admin" class="text-sm text-blue-400 hover:underline">← Admin Panel</a>
    </div>

    <div class="bg-gray-800 rounded-xl p-5 mb-5">
      <label class="block text-sm text-gray-400 mb-1">Toonstream Series URL</label>
      <div class="flex gap-2">
        <input
          id="seriesUrl"
          type="url"
          placeholder="https://toonstream.one/series/bleach/"
          class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"
        />
        <button
          id="fetchBtn"
          onclick="startFetch()"
          class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg font-semibold transition"
        >
          Fetch All
        </button>
      </div>
      <p class="text-xs text-gray-500 mt-2">
        Paste any Toonstream anime page URL. All seasons & episodes will be fetched and saved to DB (force overwrite).
      </p>
    </div>

    <div id="statusBox" class="hidden bg-gray-800 rounded-xl p-5 mb-5">
      <div class="flex items-center gap-3 mb-3">
        <div id="statusDot" class="w-3 h-3 rounded-full bg-yellow-400 animate-pulse"></div>
        <span id="statusText" class="font-semibold text-yellow-300">Working...</span>
      </div>
      <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="bg-gray-700 rounded-lg p-3 text-center">
          <div id="statTotal" class="text-2xl font-bold">—</div>
          <div class="text-xs text-gray-400 mt-1">Total Episodes</div>
        </div>
        <div class="bg-gray-700 rounded-lg p-3 text-center">
          <div id="statDone" class="text-2xl font-bold text-green-400">0</div>
          <div class="text-xs text-gray-400 mt-1">Done</div>
        </div>
        <div class="bg-gray-700 rounded-lg p-3 text-center">
          <div id="statFailed" class="text-2xl font-bold text-red-400">0</div>
          <div class="text-xs text-gray-400 mt-1">Failed</div>
        </div>
      </div>
    </div>

    <div id="logBox" class="hidden bg-gray-950 rounded-xl p-4 font-mono text-xs leading-relaxed overflow-y-auto max-h-96 border border-gray-700">
    </div>

  </div>

  <script>
    let doneCount = 0, failedCount = 0, totalCount = 0;

    function startFetch() {
      const url = document.getElementById('seriesUrl').value.trim();
      if (!url || !url.includes('toonstream')) {
        alert('Please enter a valid Toonstream URL');
        return;
      }

      doneCount = 0; failedCount = 0; totalCount = 0;
      document.getElementById('statDone').textContent = '0';
      document.getElementById('statFailed').textContent = '0';
      document.getElementById('statTotal').textContent = '—';
      document.getElementById('logBox').innerHTML = '';

      document.getElementById('statusBox').classList.remove('hidden');
      document.getElementById('logBox').classList.remove('hidden');
      document.getElementById('fetchBtn').disabled = true;
      document.getElementById('fetchBtn').textContent = 'Fetching...';
      document.getElementById('statusText').textContent = 'Fetching...';
      document.getElementById('statusText').className = 'font-semibold text-yellow-300';
      document.getElementById('statusDot').className = 'w-3 h-3 rounded-full bg-yellow-400 animate-pulse';

      fetch('/api/fetch-full-series', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ seriesUrl: url })
      }).then(async (res) => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.log) appendLog(data.log);
              if (data.done) onFinished(data);
              if (data.total) { totalCount = data.total; document.getElementById('statTotal').textContent = data.total; }
            } catch {}
          }
        }
      }).catch(err => {
        appendLog('❌ Connection error: ' + err.message);
        onFinished({ success: false, error: err.message });
      });
    }

    function appendLog(msg) {
      const box = document.getElementById('logBox');
      const line = document.createElement('div');

      // Colour-code lines
      if (msg.includes('✅') || msg.includes('✓')) line.className = 'text-green-400';
      else if (msg.includes('❌') || msg.includes('failed')) line.className = 'text-red-400';
      else if (msg.includes('⚠️')) line.className = 'text-yellow-400';
      else if (msg.includes('🎉')) line.className = 'text-blue-300 font-bold';
      else line.className = 'text-gray-300';

      // Update counters from log lines
      if (msg.match(/\[(\d+)\/(\d+)\]/)) {
        const m = msg.match(/\[(\d+)\/(\d+)\]/);
        document.getElementById('statTotal').textContent = m[2];
      }
      if (msg.includes('✅ S') && msg.includes('done')) {
        doneCount++;
        document.getElementById('statDone').textContent = doneCount;
      }
      if (msg.includes('❌ S') && msg.includes('failed')) {
        failedCount++;
        document.getElementById('statFailed').textContent = failedCount;
      }

      line.textContent = msg;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;
    }

    function onFinished(data) {
      const btn = document.getElementById('fetchBtn');
      btn.disabled = false;
      btn.textContent = 'Fetch All';

      if (data.success !== false) {
        document.getElementById('statusText').textContent = `✅ Done! "${data.title || ''}" — ${data.done} saved, ${data.failed} failed`;
        document.getElementById('statusText').className = 'font-semibold text-green-400';
        document.getElementById('statusDot').className = 'w-3 h-3 rounded-full bg-green-400';
        if (data.total) document.getElementById('statTotal').textContent = data.total;
        if (data.done !== undefined) document.getElementById('statDone').textContent = data.done;
        if (data.failed !== undefined) document.getElementById('statFailed').textContent = data.failed;
      } else {
        document.getElementById('statusText').textContent = '❌ Error: ' + (data.error || 'Unknown error');
        document.getElementById('statusText').className = 'font-semibold text-red-400';
        document.getElementById('statusDot').className = 'w-3 h-3 rounded-full bg-red-400';
      }
    }
  </script>
</body>
</html>
